<body>

    <div class="container">
        <header>
            <h1>Оракул</h1>

            <nav class="main-nav">

            </nav>

        <section id="oracle-section">
            <div class="oracle-container">
                <div id="wisdom-display" class="wisdom-text">Нажми на кристалл, чтобы познать истину...</div>
                <button id="get-wisdom-btn" class="crystal-btn">◈</button>
            </div>
        </section>

        <footer>
            © 2026 Мелитополь — Центр Сенинского Сдвига
        </footer>
    </div>

    <script>
        const originalWisdoms = [
    "Худой мир лучше сраного +7телекома.",
    "Не держи обиду, держи чай, а то прольеш.",
    "Делу время, а потехехехехехе.",
    "Скажи мне, кто твой друг, и я скажу, что ты тупой.",
    "Держи ноги в тепле, желудок в голоде, а голову в растворе формалина.",
    "С кем поведешься, того и сдашь ментам.",
    "Прыгай, как кузнечик, пархай, как бабочка, жаль, что мать сдохла.",
    "Одна ошибка и ты ошибся.",
    "Не откладывай на завтра то, что можно отложить на послезавтра.",
    "Горькая правда лучше, простреленной ноги."
];

// Копия списка, из которой будем удалять элементы
let availableWisdoms = [...originalWisdoms];

const display = document.getElementById('wisdom-display');
const btn = document.getElementById('get-wisdom-btn');

btn.addEventListener('click', () => {
    // Эффект мерцания
    display.style.opacity = 0;
    
    setTimeout(() => {
        // Если цитаты закончились, берем новый список
        if (availableWisdoms.length === 0) {
            availableWisdoms = [...originalWisdoms];
            console.log("Цикл завершен. Реальность обновлена.");
        }

        // Выбираем случайный индекс из оставшихся
        const randomIndex = Math.floor(Math.random() * availableWisdoms.length);
        
        // Извлекаем цитату (splice удаляет её из массива и возвращает нам)
        const selectedWisdom = availableWisdoms.splice(randomIndex, 1)[0];

        display.innerText = selectedWisdom;
        display.style.opacity = 1;
    }, 300);
});
    </script>
	<script src="logger.js"></script>
		
</body>
</html>
